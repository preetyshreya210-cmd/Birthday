<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Birthday Surprise ❤️</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>Happy Birthday ❤️</h1>
  <p>This is something special just for you 💖</p>

  <button onclick="startQuiz()">Start Your Surprise 🎁</button>

  <div id="quiz" class="hidden">
    <h2 id="question"></h2>
    <div id="options"></div>
    <button onclick="checkAnswer()">Submit</button>
    <p id="result"></p>
    <h2 id="gift"></h2>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
